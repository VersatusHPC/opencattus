[powertools]
name=AlmaLinux {releasever} - PowerTools
filename=almalinux.repo
mirror.repo=almalinux/{releasever}/PowerTools/{arch}/os/
mirror.gpgkey=almalinux/RPM-GPG-KEY-AlmaLinux-{releasever}
