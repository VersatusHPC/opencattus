# Example Ubuntu 24.04 compute-node answerfile for an EL xCAT head node.

[information]
cluster_name=opencattus
company_name=opencattus-enterprises
administrator_email=foo@example.com

[time]
timezone=America/Sao_Paulo
timeserver=0.br.pool.ntp.org
locale=en_US.utf8

[hostname]
hostname=opencattus
domain_name=cluster.example.com

[network_external]
interface=enp2s1
ip_address=192.168.20.254
subnet_mask=255.255.255.0
gateway=192.168.20.1
domain_name=cluster.external.example.com
nameservers=192.168.20.1

[network_management]
interface=enp2s2
ip_address=192.168.30.254
subnet_mask=255.255.255.0
gateway=192.168.30.1
domain_name=cluster.management.example.com
nameservers=192.168.122.1

[system]
disk_image=/opt/iso/ubuntu-24.04.4-live-server-amd64.iso
distro=ubuntu
version=24.04
provisioner=xcat

[ofed]
kind=inbox
version=latest

[slurm]
mariadb_root_password=xxxxxx
slurmdb_password=xxxxxx
storage_password=xxxxxx
partition_name=batch

[ohpc]
enabled=serial-libs, parallel-libs

[node]
prefix=n
padding=2
node_ip=192.168.30.1
node_root_password=pwd
sockets=1
cpus_per_node=1
cores_per_socket=1
threads_per_core=1
real_memory=4096
bmc_username=admin
bmc_password=admin
bmc_serialport=0
bmc_serialspeed=9600

[node.1]
mac_address=ca:fe:de:ad:be:ef
bmc_address=10.0.0.2
