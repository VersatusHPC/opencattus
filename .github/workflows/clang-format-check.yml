name: Clang Format Check

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: opencattus-format-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  formatting-check:
    name: Formatting check
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify runner prerequisites
        run: |
          set -euo pipefail
          REQUIRED_CLANG_FORMAT_VERSION="$(tr -d '[:space:]' < .clang-format-version)"

          resolve_clang_format_bin() {
            CLANG_FORMAT_BIN=""
            if [[ -n "${REQUIRED_CLANG_FORMAT_VERSION}" ]] && command -v "clang-format-${REQUIRED_CLANG_FORMAT_VERSION}" >/dev/null 2>&1; then
              CLANG_FORMAT_BIN="$(command -v "clang-format-${REQUIRED_CLANG_FORMAT_VERSION}")"
            elif command -v clang-format >/dev/null 2>&1; then
              CLANG_FORMAT_BIN="$(command -v clang-format)"
            fi
          }

          clang_format_major_version() {
            "${CLANG_FORMAT_BIN}" --version | sed -nE 's/.* ([0-9]+)(\.[0-9]+)+.*/\1/p' | head -n 1
          }

          resolve_clang_format_bin

          if [[ -n "${REQUIRED_CLANG_FORMAT_VERSION}" ]]; then
            current_major=""
            if [[ -n "${CLANG_FORMAT_BIN}" ]]; then
              current_major="$(clang_format_major_version)"
            fi

            if [[ "${current_major}" != "${REQUIRED_CLANG_FORMAT_VERSION}" ]]; then
              command -v python3 >/dev/null 2>&1 || {
                echo "python3 is required to install clang-format ${REQUIRED_CLANG_FORMAT_VERSION}" >&2
                exit 1
              }

              next_version="$((REQUIRED_CLANG_FORMAT_VERSION + 1))"
              python3 -m pip install --user --upgrade \
                "clang-format>=${REQUIRED_CLANG_FORMAT_VERSION}.0,<${next_version}.0"

              export PATH="$(python3 -m site --user-base)/bin:${PATH}"
              resolve_clang_format_bin
            fi
          fi

          [[ -n "${CLANG_FORMAT_BIN}" ]] || {
            echo "clang-format is not installed on the self-hosted runner" >&2
            exit 1
          }

          CLANG_FORMAT_VERSION_LINE="$("${CLANG_FORMAT_BIN}" --version | head -n 1)"
          [[ "${CLANG_FORMAT_VERSION_LINE}" =~ ([0-9]+)(\.[0-9]+)+ ]] || {
            echo "Unable to determine the clang-format version for ${CLANG_FORMAT_BIN}" >&2
            exit 1
          }

          if [[ -n "${REQUIRED_CLANG_FORMAT_VERSION}" && "${BASH_REMATCH[1]}" != "${REQUIRED_CLANG_FORMAT_VERSION}" ]]; then
            echo "clang-format ${CLANG_FORMAT_VERSION_LINE} does not match required major version ${REQUIRED_CLANG_FORMAT_VERSION}" >&2
            exit 1
          fi

          echo "Using ${CLANG_FORMAT_VERSION_LINE}"
          echo "CLANG_FORMAT_BIN=${CLANG_FORMAT_BIN}" >> "${GITHUB_ENV}"

      - name: Collect changed source files
        run: |
          set -euo pipefail
          base_ref=""

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base_ref="${{ github.event.before }}"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            base_ref="HEAD^"
          fi

          if [[ -n "${base_ref}" ]]; then
            git diff --name-only --diff-filter=ACMR "${base_ref}" HEAD -- include src > changed-files.txt
          else
            : > changed-files.txt
          fi

          grep -E '\.(h|hpp|c|cc|cpp)$' changed-files.txt > changed-cpp-files.txt || true

          if [[ ! -s changed-cpp-files.txt ]]; then
            echo "No changed C/C++ files to check."
            echo "HAS_FORMATTED_FILES=false" >> "${GITHUB_ENV}"
            exit 0
          fi

          tr '\n' '\0' < changed-cpp-files.txt > changed-cpp-files.nul
          echo "HAS_FORMATTED_FILES=true" >> "${GITHUB_ENV}"

      - name: Run clang-format style check
        if: env.HAS_FORMATTED_FILES == 'true'
        run: xargs -0 "${CLANG_FORMAT_BIN}" --dry-run --Werror < changed-cpp-files.nul
