name: Self-Hosted CI

# Disabled: replaced by Jenkins CI (see Jenkinsfile + ci/project.yaml).
# Kept as manual fallback via workflow_dispatch. Remove once Jenkins
# pipeline is validated for release publishing.
on: workflow_dispatch

concurrency:
  group: opencattus-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fast-tests:
    name: Fast Tests
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 60

    steps:
      - name: Fix workspace ownership from previous sudo podman builds
        run: sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" 2>/dev/null || true

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify runner prerequisites
        run: |
          set -euo pipefail
          for cmd in cmake ninja python3 ccache pkg-config; do
            command -v "${cmd}" >/dev/null || {
              echo "Missing required command on self-hosted runner: ${cmd}" >&2
              exit 1
            }
          done

          pkg-config --exists glibmm-2.4 || pkg-config --exists glibmm-2.68 || {
            echo "Missing glibmm development files on self-hosted runner" >&2
            exit 1
          }

          pkg-config --exists newt || pkg-config --exists libnewt || {
            echo "Missing newt development files on self-hosted runner" >&2
            exit 1
          }

      - name: Prepare Conan environment
        run: |
          set -euo pipefail
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install conan

      - name: Configure
        run: |
          set -euo pipefail
          source .venv/bin/activate
          cmake -S . -B build-host -G Ninja -DBUILD_TESTING=ON

      - name: Build app and test runner
        run: |
          set -euo pipefail
          source .venv/bin/activate
          cmake --build build-host --target opencattus OpenCATTUS-tests -j"$(nproc)"

      - name: Run fast test suite
        run: |
          eval "$(dbus-launch --sh-syntax)" 2>/dev/null || true
          ctest --test-dir build-host --output-on-failure

  rpm-build:
    name: RPM Build (${{ matrix.el }})
    needs: fast-tests
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - el: EL8
            image: docker.io/library/rockylinux:8
            setup: >-
              dnf install -y dnf-plugins-core epel-release &&
              dnf config-manager --set-enabled powertools &&
              dnf install -y python39 python39-pip &&
              alternatives --set python3 /usr/bin/python3.9
            extra_pkgs: >-
              gcc-toolset-14
              gcc-toolset-14-libubsan-devel
              gcc-toolset-14-libasan-devel
              glibmm24-devel
          - el: EL9
            image: docker.io/library/rockylinux:9
            setup: >-
              dnf install -y dnf-plugins-core epel-release &&
              dnf config-manager --set-enabled crb
            extra_pkgs: >-
              gcc-toolset-14
              gcc-toolset-14-libubsan-devel
              gcc-toolset-14-libasan-devel
              glibmm24-devel
          - el: EL10
            image: registry.access.redhat.com/ubi10/ubi:latest
            setup: >-
              dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-10.noarch.rpm
            extra_pkgs: >-
              gcc-c++
              glibmm2.4-devel

    steps:
      - name: Fix workspace ownership from previous sudo podman builds
        run: sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" 2>/dev/null || true

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify release tag matches project version
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          tag="${tag#v}"
          project_version=$(sed -nE 's/^[[:space:]]*VERSION[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' CMakeLists.txt | head -n1)
          if [[ -z "${project_version}" ]]; then
            echo "::error::Could not parse VERSION from CMakeLists.txt" >&2
            exit 1
          fi
          if [[ "${tag}" != "${project_version}" ]]; then
            echo "::error::Release tag (${tag}) does not match CMakeLists.txt project version (${project_version}). Bump CMakeLists.txt project VERSION and re-tag." >&2
            exit 1
          fi
          echo "Release tag and project version match: ${tag}"

      - name: Verify Podman runner state
        run: |
          set -euo pipefail
          command -v podman >/dev/null || {
            echo "Missing required command on self-hosted runner: podman" >&2
            exit 1
          }

          # Self-hosted runners occasionally keep stale rootless Podman state
          # after reboots or package updates. Try the recommended repair first
          # so container-based jobs can recover without manual intervention.
          sudo podman system migrate || true
          sudo podman info >/dev/null

      - name: Prepare Conan cache
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.cache/opencattus/conan/${{ matrix.el }}"
          mkdir -p "${HOME}/.cache/opencattus/cpm/${{ matrix.el }}"
          mkdir -p "${HOME}/.cache/opencattus/sources/${{ matrix.el }}"

      - name: Build RPM in ${{ matrix.el }} container
        run: |
          set -euo pipefail
          sudo podman run --rm \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}:z" \
            -v "${HOME}/.cache/opencattus/conan/${{ matrix.el }}:/root/.conan2:z" \
            -v "${HOME}/.cache/opencattus/cpm/${{ matrix.el }}:/root/.cache/CPM:z" \
            -v "${HOME}/.cache/opencattus/sources/${{ matrix.el }}:/root/.cache/opencattus/sources:z" \
            -w "${GITHUB_WORKSPACE}" \
            ${{ matrix.image }} \
            bash -lc '
              set -euo pipefail
              ${{ matrix.setup }}
              dnf install -y git rpmdevtools rpm-build tar gzip \
                make cmake ninja-build newt-devel systemd-devel \
                python3 python3-pip \
                autoconf automake libtool meson perl-core \
                ${{ matrix.extra_pkgs }}
              export OPENCATTUS_SOURCE_CACHE="/root/.cache/opencattus/sources"
              mkdir -p "${OPENCATTUS_SOURCE_CACHE}"
              fetch_source() {
                local url="$1"
                local path="$2"
                local tmp="${path}.tmp"

                if [ -s "${path}" ] && python3 -m zipfile -t "${path}" >/dev/null 2>&1; then
                  return 0
                fi

                rm -f "${path}" "${tmp}"
                for attempt in 1 2 3 4 5; do
                  if curl --fail --location --retry 8 --retry-delay 5 \
                    --connect-timeout 20 --output "${tmp}" "${url}" &&
                    python3 -m zipfile -t "${tmp}" >/dev/null 2>&1; then
                    mv "${tmp}" "${path}"
                    return 0
                  fi

                  rm -f "${tmp}"
                  sleep 5
                done

                echo "Failed to fetch ${url}" >&2
                return 1
              }
              export OPENCATTUS_FARGS_ARCHIVE="${OPENCATTUS_SOURCE_CACHE}/cmake-forward-arguments-8c50d1f956172edb34e95efa52a2d5cb1f686ed2.zip"
              export OPENCATTUS_YCM_ARCHIVE="${OPENCATTUS_SOURCE_CACHE}/ycm-v0.13.0.zip"
              fetch_source \
                "https://github.com/polysquare/cmake-forward-arguments/archive/8c50d1f956172edb34e95efa52a2d5cb1f686ed2.zip" \
                "${OPENCATTUS_FARGS_ARCHIVE}"
              fetch_source \
                "https://github.com/robotology/ycm/archive/refs/tags/v0.13.0.zip" \
                "${OPENCATTUS_YCM_ARCHIVE}"
              python3 -m venv /tmp/conan-venv
              /tmp/conan-venv/bin/pip install conan
              export PATH="/tmp/conan-venv/bin:${PATH}"
              if [ -f /opt/rh/gcc-toolset-14/enable ]; then
                source /opt/rh/gcc-toolset-14/enable
              fi
              conan profile detect --force
              git config --global --add safe.directory "${{ github.workspace }}"
              cmake -S . -B "build-rpm-${{ matrix.el }}" -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTING=OFF
              cmake --build "build-rpm-${{ matrix.el }}" \
                --target opencattus -j"$(nproc)"

              mkdir -p "out/rpm/${{ matrix.el }}"
              export QA_RPATHS=$((0x0002|0x0010))
              cpack -G RPM \
                --config "build-rpm-${{ matrix.el }}/CPackConfig.cmake" \
                -B "out/rpm/${{ matrix.el }}"
              ls -l "out/rpm/${{ matrix.el }}"/opencattus*.rpm
            '

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencattus-rpm-${{ matrix.el }}
          path: out/rpm/${{ matrix.el }}/*.rpm
          if-no-files-found: error

  publish-rpm-repo:
    name: Publish RPM Repository
    needs: rpm-build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 30

    env:
      REPO_MOUNT: /srv/opencattus-repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download RPM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: opencattus-rpm-*
          path: out/rpm-publish-input
          merge-multiple: true

      - name: Verify runner prerequisites
        run: |
          set -euo pipefail
          for cmd in createrepo_c flock mountpoint; do
            command -v "${cmd}" >/dev/null || {
              echo "::error::Missing required command on self-hosted runner: ${cmd}" >&2
              exit 1
            }
          done
          mountpoint -q "${REPO_MOUNT}" || {
            echo "::error::Repo NFS mount missing on $(hostname) at ${REPO_MOUNT}. Bring up the mount and retry." >&2
            exit 1
          }

      - name: Publish RPM repository
        run: |
          set -euo pipefail
          flock "${REPO_MOUNT}/.publish.lock" \
            scripts/publish-rpms.sh \
              --source-dir out/rpm-publish-input \
              --target-dir "${REPO_MOUNT}"

  deb-build:
    name: DEB Build (Ubuntu 24.04)
    needs: [fast-tests, rpm-build]
    if: always() && needs.fast-tests.result == 'success'
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 60

    steps:
      - name: Fix workspace ownership from previous sudo podman builds
        run: sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" 2>/dev/null || true

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify release tag matches project version
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          tag="${tag#v}"
          project_version=$(sed -nE 's/^[[:space:]]*VERSION[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' CMakeLists.txt | head -n1)
          if [[ -z "${project_version}" ]]; then
            echo "::error::Could not parse VERSION from CMakeLists.txt" >&2
            exit 1
          fi
          if [[ "${tag}" != "${project_version}" ]]; then
            echo "::error::Release tag (${tag}) does not match CMakeLists.txt project version (${project_version}). Bump CMakeLists.txt project VERSION and re-tag." >&2
            exit 1
          fi
          echo "Release tag and project version match: ${tag}"

      - name: Verify Podman runner state
        run: |
          set -euo pipefail
          command -v podman >/dev/null || {
            echo "Missing required command on self-hosted runner: podman" >&2
            exit 1
          }

          sudo podman system migrate || true
          sudo podman info >/dev/null

      - name: Prepare Conan cache
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.cache/opencattus/conan/ubuntu2404"
          mkdir -p "${HOME}/.cache/opencattus/cpm/ubuntu2404"
          mkdir -p "${HOME}/.cache/opencattus/sources/ubuntu2404"

      - name: Build DEB in Ubuntu 24.04 container
        run: |
          set -euo pipefail
          sudo podman run --rm \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}:z" \
            -v "${HOME}/.cache/opencattus/conan/ubuntu2404:/root/.conan2:z" \
            -v "${HOME}/.cache/opencattus/cpm/ubuntu2404:/root/.cache/CPM:z" \
            -v "${HOME}/.cache/opencattus/sources/ubuntu2404:/root/.cache/opencattus/sources:z" \
            -w "${GITHUB_WORKSPACE}" \
            docker.io/library/ubuntu:24.04 \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              # Self-hosted runners have broken IPv6 routing to security.ubuntu.com;
              # pin apt to IPv4 so updates do not stall on the CDN AAAA records.
              echo "Acquire::ForceIPv4 \"true\";" > /etc/apt/apt.conf.d/99force-ipv4
              apt update
              apt install -y ca-certificates curl git dpkg-dev \
                build-essential cmake ninja-build \
                pkg-config python3 python3-pip python3-venv \
                autoconf automake libtool meson perl \
                libglibmm-2.4-dev libnewt-dev libsystemd-dev
              export OPENCATTUS_SOURCE_CACHE="/root/.cache/opencattus/sources"
              mkdir -p "${OPENCATTUS_SOURCE_CACHE}"
              fetch_source() {
                local url="$1"
                local path="$2"
                local tmp="${path}.tmp"

                if [ -s "${path}" ] && python3 -m zipfile -t "${path}" >/dev/null 2>&1; then
                  return 0
                fi

                rm -f "${path}" "${tmp}"
                for attempt in 1 2 3 4 5; do
                  if curl --fail --location --retry 8 --retry-delay 5 \
                    --connect-timeout 20 --output "${tmp}" "${url}" &&
                    python3 -m zipfile -t "${tmp}" >/dev/null 2>&1; then
                    mv "${tmp}" "${path}"
                    return 0
                  fi

                  rm -f "${tmp}"
                  sleep 5
                done

                echo "Failed to fetch ${url}" >&2
                return 1
              }
              export OPENCATTUS_FARGS_ARCHIVE="${OPENCATTUS_SOURCE_CACHE}/cmake-forward-arguments-8c50d1f956172edb34e95efa52a2d5cb1f686ed2.zip"
              export OPENCATTUS_YCM_ARCHIVE="${OPENCATTUS_SOURCE_CACHE}/ycm-v0.13.0.zip"
              fetch_source \
                "https://github.com/polysquare/cmake-forward-arguments/archive/8c50d1f956172edb34e95efa52a2d5cb1f686ed2.zip" \
                "${OPENCATTUS_FARGS_ARCHIVE}"
              fetch_source \
                "https://github.com/robotology/ycm/archive/refs/tags/v0.13.0.zip" \
                "${OPENCATTUS_YCM_ARCHIVE}"
              python3 -m venv /tmp/conan-venv
              /tmp/conan-venv/bin/pip install conan
              export PATH="/tmp/conan-venv/bin:${PATH}"
              conan profile detect --force
              git config --global --add safe.directory "$(pwd)"
              cmake -S . -B build-deb -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTING=OFF
              cmake --build build-deb --target opencattus -j"$(nproc)"

              mkdir -p out/deb
              cpack -G DEB \
                --config build-deb/CPackConfig.cmake \
                -B out/deb
              ls -l out/deb/opencattus*.deb
            '

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencattus-deb-ubuntu2404
          path: out/deb/*.deb
          if-no-files-found: error

  publish-deb-repo:
    name: Publish DEB Repository
    needs: deb-build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 30

    env:
      REPO_MOUNT: /srv/opencattus-repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download DEB artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: opencattus-deb-*
          path: out/deb-publish-input
          merge-multiple: true

      - name: Verify runner prerequisites
        run: |
          set -euo pipefail
          for cmd in dpkg-scanpackages flock mountpoint gzip; do
            command -v "${cmd}" >/dev/null || {
              echo "::error::Missing required command on self-hosted runner: ${cmd}" >&2
              exit 1
            }
          done
          mountpoint -q "${REPO_MOUNT}" || {
            echo "::error::Repo NFS mount missing on $(hostname) at ${REPO_MOUNT}. Bring up the mount and retry." >&2
            exit 1
          }

      - name: Publish DEB repository
        run: |
          set -euo pipefail
          flock "${REPO_MOUNT}/.publish.lock" \
            scripts/publish-debs.sh \
              --source-dir out/deb-publish-input \
              --target-dir "${REPO_MOUNT}"
