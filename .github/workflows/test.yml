name: Self-Hosted CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: opencattus-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-tests:
    name: Fast Tests
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify runner prerequisites
        run: |
          set -euo pipefail
          for cmd in cmake ninja python3 ccache pkg-config; do
            command -v "${cmd}" >/dev/null || {
              echo "Missing required command on self-hosted runner: ${cmd}" >&2
              exit 1
            }
          done

          pkg-config --exists glibmm-2.4 || {
            echo "Missing glibmm development files on self-hosted runner" >&2
            exit 1
          }

          pkg-config --exists newt || {
            echo "Missing newt development files on self-hosted runner" >&2
            exit 1
          }

      - name: Prepare Conan environment
        run: |
          set -euo pipefail
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install conan

      - name: Configure
        run: |
          set -euo pipefail
          source .venv/bin/activate
          cmake -S . -B build-host -G Ninja -DBUILD_TESTING=ON

      - name: Build app and test runner
        run: |
          set -euo pipefail
          source .venv/bin/activate
          cmake --build build-host --target opencattus OpenCATTUS-tests -j"$(nproc)"

      - name: Run fast test suite
        run: ctest --test-dir build-host --output-on-failure

  rpm-build:
    name: RPM Build (${{ matrix.el }})
    needs: fast-tests
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - el: EL8
            image: registry.access.redhat.com/ubi8/ubi:latest
            epel: https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm
            extra_pkgs: >-
              gcc-toolset-14
              gcc-toolset-14-libubsan-devel
              gcc-toolset-14-libasan-devel
              glibmm24-devel
          - el: EL9
            image: registry.access.redhat.com/ubi9/ubi:latest
            epel: https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm
            extra_pkgs: >-
              gcc-toolset-14
              gcc-toolset-14-libubsan-devel
              gcc-toolset-14-libasan-devel
              glibmm24-devel
          - el: EL10
            image: registry.access.redhat.com/ubi10/ubi:latest
            epel: https://dl.fedoraproject.org/pub/epel/epel-release-latest-10.noarch.rpm
            extra_pkgs: >-
              gcc-c++
              glibmm2.4-devel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build RPM in ${{ matrix.el }} container
        run: |
          set -euo pipefail
          podman run --rm \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}:z" \
            -w "${GITHUB_WORKSPACE}" \
            ${{ matrix.image }} \
            bash -lc '
              set -euo pipefail
              dnf install -y ${{ matrix.epel }}
              dnf install -y git rpmdevtools rpm-build tar gzip \
                make cmake ninja-build newt-devel systemd-devel \
                ${{ matrix.extra_pkgs }}
              git config --global --add safe.directory "${{ github.workspace }}"
              VERSION=$(awk "/Version:/ {print \$2}" rpmspecs/opencattus.spec)
              rpmdev-setuptree
              cp rpmspecs/opencattus.spec ~/rpmbuild/SPECS/
              git archive -o ~/rpmbuild/SOURCES/opencattus-${VERSION}.tar.gz \
                --format tgz HEAD --prefix opencattus-${VERSION}/
              rpmbuild -ba ~/rpmbuild/SPECS/opencattus.spec
              ls -l ~/rpmbuild/RPMS/*/opencattus-installer*.rpm
            '
